<html>
<body>
    {% for category in categories %}
    <h2>{{ category.title }}</h2>

    {% for product in category.products.all %}
        <h3>
            {{ product.title }} - ${{ product.price }}
            {% for tag in product.tags.all %}
                <span>{{ tag.label }}</span>
            {% endfor %}
        </h3>
        <p>{{ product.description }}</p>
    {% endfor %}

    {% endfor %}
</body>
</html>
